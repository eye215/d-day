<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700|Montserrat:900">
  <title>Document</title>

  <style>
    body{
      background-color: white;
    }

    #timer {
      color: #ccc;
      text-align: center;
      text-transform: uppercase;
      font-family: 'Lato', sans-serif;
      font-size: .7em;
      letter-spacing: 5px;
      width:200px;
      height:160px;
    }

    .days, .hours, .minutes, .seconds {
      display: inline-block;
      padding: 20px;
      border-radius: 5px;
    }

    .days {
      background: white;
      border: #ccc 1px solid;
    }

    .hours, .minutes, .seconds {
      display: none;
    }

    .numbers {
      font-family: 'Montserrat', sans-serif;
      color: #666;
      font-size: 4em;
      text-align: center;
      width:200px;
      height:160px;
    }
  </style>
</head>

<body>

  <div id="timer">
    <div class="days">
      <div id="days" class="numbers"></div>
    </div>

    <div class="hours">
      <div id="hours" class="numbers"></div>
    </div>

    <div class="minutes">
      <div id="minutes" class="numbers"></div>
    </div>

    <div class="seconds">
      <div id="seconds" class="numbers"></div>
    </div>
  </div>

</body>

<script>
  const myDate = new Date('Oct 17, 2026 00:00:00').getTime();

  setInterval(function () {
    const today = new Date().getTime();
    const diff = myDate - today;

    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

    let dday;

    if (days > 0) {
      dday = `D-${days}`;
    } else if (days === 0) {
      dday = 'D-DAY';
    } else {
      dday = `D+${Math.abs(days)}`;
    }

    document.getElementById("days").innerHTML = dday;
  }, 1000);
</script>

</html>
